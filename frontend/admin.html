<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Admin Dashboard</h1>

<h3>Create Course</h3>

<input id="courseName" placeholder="Course name">

<input id="courseDesc" placeholder="Description">

<button onclick="createCourse()">Create Course</button>

<h3>Create Subject</h3>

<input id="subjectName" placeholder="Subject name">

<input id="subjectDesc" placeholder="Description">

<input id="courseId" placeholder="Course ID">

<button onclick="createSubject()">Create Subject</button>

<h3>Create Topic</h3>

<input id="topicTitle" placeholder="Topic title">

<input id="subjectId" placeholder="Subject ID">

<button onclick="createTopic()">Create Topic</button>

<script src="admin.js"></script>

</body>

</html>
