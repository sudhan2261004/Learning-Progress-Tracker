<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Learning Progress Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-content h1 {
            color: #1e3c72;
            font-size: 32px;
            margin-bottom: 8px;
        }

        .header-subtitle {
            color: #666;
            font-size: 14px;
        }

        .admin-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .admin-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(30, 60, 114, 0.3);
        }

        .logout-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(30, 60, 114, 0.4);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: #1e3c72;
            transition: all 0.3s ease;
            backdrop-filter: blur(20px);
        }

        .tab-btn:hover {
            background: white;
            border-color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-color: transparent;
            color: white;
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.4);
        }

        .grid-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .section-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: slideUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .section-card:nth-child(1) { animation-delay: 0.1s; }
        .section-card:nth-child(2) { animation-delay: 0.2s; }
        .section-card:nth-child(3) { animation-delay: 0.3s; }
        .section-card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-card h2 {
            color: #1e3c72;
            font-size: 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-icon {
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #555;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #f8f9fa;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #4facfe;
            background: white;
            box-shadow: 0 0 0 4px rgba(79, 172, 254, 0.1);
            transform: translateY(-2px);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-create {
            flex: 1;
            padding: 12px 20px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.5);
        }

        .btn-create:active {
            transform: translateY(0);
        }

        .btn-refresh {
            flex: 1;
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .list-container {
            margin-top: 25px;
        }

        .item {
            padding: 15px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #4facfe;
            transition: all 0.3s ease;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .item:hover {
            transform: translateX(8px);
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.2);
        }

        .item-header {
            font-weight: 600;
            color: #1e3c72;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-desc {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }

        .item-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .btn-small:hover {
            background: #f8f9fa;
            border-color: #4facfe;
            color: #4facfe;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .empty-text {
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
                gap: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .grid-section {
                grid-template-columns: 1fr;
            }

            .section-card {
                padding: 25px;
            }

            .tabs {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 20px;
            }

            .container {
                padding: 0;
            }

            .section-card {
                padding: 20px;
            }

            .section-card h2 {
                font-size: 18px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <h1>⚙️ Admin Dashboard</h1>
                <p class="header-subtitle">Manage courses, subjects, and learning content</p>
            </div>
            <div class="admin-profile">
                <div>
                    <div style="color: #333; font-weight: 600;">Admin Panel</div>
                    <div style="color: #999; font-size: 12px;">Full control</div>
                </div>
                <div class="admin-avatar">👨‍💼</div>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('courses')">🎓 Courses</button>
            <button class="tab-btn" onclick="switchTab('subjects')">📝 Subjects</button>
            <button class="tab-btn" onclick="switchTab('topics')">🎯 Topics</button>
        </div>

        <div class="grid-section">
            <div class="section-card">
                <h2>
                    <span class="section-icon">➕</span>
                    <span>Create Course</span>
                </h2>
                <div class="form-group">
                    <label for="courseName">Course Name</label>
                    <input id="courseName" type="text" placeholder="e.g., Introduction to Web Development">
                </div>
                <div class="form-group">
                    <label for="courseDesc">Description</label>
                    <input id="courseDesc" type="text" placeholder="Describe the course briefly">
                </div>
                <div class="button-group">
                    <button class="btn-create" onclick="createCourse()">Create Course</button>
                </div>
            </div>

            <div class="section-card">
                <h2>
                    <span class="section-icon">📚</span>
                    <span>All Courses</span>
                </h2>
                <div class="button-group">
                    <button class="btn-refresh" onclick="loadCourses()">Refresh List</button>
                </div>
                <div class="list-container" id="courseList">
                    <div class="empty-state">
                        <div class="empty-icon">📚</div>
                        <div class="empty-text">Click refresh to load courses</div>
                    </div>
                </div>
            </div>

            <div class="section-card">
                <h2>
                    <span class="section-icon">➕</span>
                    <span>Create Subject</span>
                </h2>
                <div class="form-group">
                    <label for="subjectName">Subject Name</label>
                    <input id="subjectName" type="text" placeholder="e.g., HTML Basics">
                </div>
                <div class="form-group">
                    <label for="subjectDesc">Description</label>
                    <input id="subjectDesc" type="text" placeholder="Describe the subject">
                </div>
                <div class="form-group">
                    <label for="courseId">Course ID</label>
                    <select id="courseDropdown" onchange="onCourseChange()"></select>
                </div>
                <div class="button-group">
                    <button class="btn-create" onclick="createSubject()">Create Subject</button>
                </div>
            </div>

            <div class="section-card">
                <h2>
                    <span class="section-icon">📖</span>
                    <span>All Subjects</span>
                </h2>
                <div class="button-group">
                    <button class="btn-refresh" onclick="loadSubjects()">Refresh List</button>
                </div>
                <div class="list-container" id="subjectList">
                    <div class="empty-state">
                        <div class="empty-icon">📖</div>
                        <div class="empty-text">Click refresh to load subjects</div>
                    </div>
                </div>
            </div>

            <div class="section-card">
                <h2>
                    <span class="section-icon">➕</span>
                    <span>Create Topic</span>
                </h2>
                <div class="form-group">
                    <label for="topicTitle">Topic Title</label>
                    <input id="topicTitle" type="text" placeholder="e.g., HTML Tags and Elements">
                </div>
                <div class="form-group">
                    <label for="topicSubjectId">Subject ID</label>
                    <select id="subjectDropdown"></select>
                </div>
                <div class="button-group">
                    <button class="btn-create" onclick="createTopic()">Create Topic</button>
                </div>
            </div>

            <div class="section-card">
                <h2>
                    <span class="section-icon">🎯</span>
                    <span>All Topics</span>
                </h2>
                <div class="button-group">
                    <button class="btn-refresh" onclick="loadTopics()">Refresh List</button>
                </div>
                <div class="list-container" id="topicList">
                    <div class="empty-state">
                        <div class="empty-icon">🎯</div>
                        <div class="empty-text">Click refresh to load topics</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function initAdmin() {
            console.log("Admin panel initialized");
        }

        function switchTab(tabName) {
            // Tab switching functionality
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
    </script>

    <script src="js/admin.js"></script>
</body>
</html>
